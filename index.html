<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1">
<title>Respira</title>
<meta name="theme-color" content="#0a0a14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Respira">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" href="icon.svg">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0a0a14;
  --bg-elev: #14141f;
  --bg-elev-2: #1d1d2c;
  --text: rgba(255,255,255,0.92);
  --text-dim: rgba(255,255,255,0.55);
  --accent: #7e9ce8;
  --accent-2: #b388ff;
}
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  overscroll-behavior: none;
  user-select: none;
  -webkit-user-select: none;
}
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }

/* HOME */
#home {
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: calc(env(safe-area-inset-top) + 28px) 22px calc(env(safe-area-inset-bottom) + 24px);
  overflow-y: auto;
}
#home h1 {
  font-size: 30px;
  font-weight: 200;
  letter-spacing: 0.32em;
  text-align: center;
  margin-bottom: 4px;
}
#home .tagline {
  font-size: 12px;
  color: var(--text-dim);
  text-align: center;
  margin-bottom: 32px;
  letter-spacing: 0.08em;
}
.section-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--text-dim);
  margin-bottom: 10px;
  padding-left: 4px;
}
.patterns {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 24px;
}
.pattern {
  background: var(--bg-elev);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  text-align: left;
  width: 100%;
  transition: background 0.15s, transform 0.1s;
}
.pattern:active { background: var(--bg-elev-2); transform: scale(0.985); }
.pattern .name { font-size: 15px; font-weight: 500; margin-bottom: 3px; }
.pattern .desc { font-size: 12px; color: var(--text-dim); }
.pattern .pace {
  font-size: 11px;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
  margin-left: 12px;
  flex-shrink: 0;
}
.row {
  background: var(--bg-elev);
  border-radius: 14px;
  padding: 12px 16px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.row .label { font-size: 14px; }
.options { display: flex; gap: 4px; }
.option {
  padding: 6px 11px;
  border-radius: 10px;
  font-size: 13px;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
  transition: all 0.15s;
}
.option.active { background: var(--accent); color: #fff; }
.freq-hint {
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
  letter-spacing: 0.06em;
  margin-top: 6px;
  min-height: 14px;
  font-style: italic;
}

/* SESSION */
#session {
  height: 100%;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: calc(env(safe-area-inset-top) + 18px) 22px calc(env(safe-area-inset-bottom) + 24px);
  position: relative;
}
#session.active { display: flex; }
.session-top {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 2;
}
.session-top .pattern-name {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.18em;
}
.session-top .timer {
  font-size: 13px;
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.04em;
}
.breathing-area {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  width: 100%;
}
.circle-wrap {
  position: relative;
  width: 280px;
  height: 280px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.circle-outer {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.06);
}
.circle {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at 32% 30%,
    rgba(201,179,255,0.85),
    rgba(126,156,232,0.5) 55%,
    rgba(126,156,232,0.08) 100%);
  transform: scale(0.42);
  transition: transform 4s cubic-bezier(0.45, 0, 0.55, 1);
  box-shadow: 0 0 80px rgba(126,156,232,0.25);
}
.circle-content {
  position: relative;
  text-align: center;
  z-index: 1;
  pointer-events: none;
}
.instruction {
  font-size: 26px;
  font-weight: 300;
  letter-spacing: 0.14em;
  margin-bottom: 8px;
}
.counter {
  font-size: 44px;
  font-weight: 200;
  font-variant-numeric: tabular-nums;
  color: var(--text-dim);
  min-height: 52px;
}
.tap-hint {
  position: absolute;
  bottom: calc(50% - 170px);
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  color: var(--text-dim);
  text-align: center;
  letter-spacing: 0.08em;
  animation: pulse 2.2s ease-in-out infinite;
  display: none;
}
.tap-hint.visible { display: block; }
@keyframes pulse {
  0%, 100% { opacity: 0.45; }
  50% { opacity: 0.95; }
}
.session-bottom {
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.round-info {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.12em;
  min-height: 14px;
}
.stop {
  padding: 11px 30px;
  border-radius: 22px;
  background: rgba(255,255,255,0.07);
  font-size: 13px;
  letter-spacing: 0.08em;
  color: var(--text);
  transition: background 0.15s;
}
.stop:active { background: rgba(255,255,255,0.16); }

/* CUSTOM MODAL */
#custom-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: flex-end;
  z-index: 10;
  backdrop-filter: blur(4px);
}
#custom-modal.visible { display: flex; }
.modal-content {
  background: #1a1a26;
  width: 100%;
  border-radius: 22px 22px 0 0;
  padding: 22px 22px calc(env(safe-area-inset-bottom) + 22px);
}
.modal-content h2 {
  font-size: 17px;
  font-weight: 500;
  margin-bottom: 14px;
  letter-spacing: 0.04em;
}
.custom-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 14px;
}
.custom-row:last-of-type { border-bottom: none; }
.stepper { display: flex; align-items: center; gap: 10px; }
.stepper button {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}
.stepper button:active { background: rgba(255,255,255,0.16); }
.stepper .value {
  width: 26px;
  text-align: center;
  font-variant-numeric: tabular-nums;
  font-size: 15px;
}
.modal-actions { display: flex; gap: 8px; margin-top: 16px; }
.modal-actions button {
  flex: 1;
  padding: 13px;
  border-radius: 12px;
  font-size: 14px;
  letter-spacing: 0.04em;
}
.btn-cancel { background: rgba(255,255,255,0.06); }
.btn-confirm { background: var(--accent); color: #fff; }

/* END SCREEN */
.session-end {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 5;
  padding: 24px;
  text-align: center;
}
.session-end.visible { display: flex; }
.session-end h2 {
  font-size: 22px;
  font-weight: 200;
  letter-spacing: 0.18em;
  margin-bottom: 10px;
}
.session-end p {
  color: var(--text-dim);
  margin-bottom: 26px;
  font-size: 14px;
}
.session-end button {
  padding: 11px 32px;
  border-radius: 22px;
  background: rgba(255,255,255,0.08);
  font-size: 13px;
  letter-spacing: 0.08em;
}
</style>
</head>
<body>

<main id="home">
  <h1>RESPIRA</h1>
  <div class="tagline">respiração consciente</div>

  <div class="section-title">Padrão</div>
  <div class="patterns" id="patterns-list"></div>

  <div class="section-title">Duração</div>
  <div class="row">
    <span class="label">Minutos</span>
    <div class="options" id="duration-opts">
      <button class="option" data-min="3">3</button>
      <button class="option active" data-min="5">5</button>
      <button class="option" data-min="10">10</button>
      <button class="option" data-min="15">15</button>
      <button class="option" data-min="0">∞</button>
    </div>
  </div>

  <div class="section-title">Som</div>
  <div class="row">
    <span class="label">Guia</span>
    <div class="options" id="guide-opts">
      <button class="option" data-guide="off">Off</button>
      <button class="option" data-guide="sino">Sino</button>
      <button class="option active" data-guide="voz">Voz</button>
    </div>
  </div>
  <div class="row">
    <span class="label">Hz</span>
    <div class="options" id="freq-opts">
      <button class="option active" data-freq="0">Off</button>
      <button class="option" data-freq="396">396</button>
      <button class="option" data-freq="432">432</button>
      <button class="option" data-freq="528">528</button>
      <button class="option" data-freq="639">639</button>
    </div>
  </div>
  <div class="freq-hint" id="freq-hint"></div>
  <div class="row">
    <span class="label">Volume</span>
    <div class="options" id="vol-opts">
      <button class="option" data-vol="0.5">Baixo</button>
      <button class="option" data-vol="1">Médio</button>
      <button class="option active" data-vol="1.8">Alto</button>
    </div>
  </div>
</main>

<main id="session">
  <div class="session-top">
    <span class="pattern-name" id="session-pattern-name"></span>
    <span class="timer" id="session-timer"></span>
  </div>
  <div class="breathing-area">
    <div class="circle-wrap">
      <div class="circle-outer"></div>
      <div class="circle" id="breathing-circle"></div>
      <div class="circle-content">
        <div class="instruction" id="instruction">Prepare</div>
        <div class="counter" id="counter"></div>
      </div>
    </div>
    <div class="tap-hint" id="tap-hint">toque para continuar</div>
  </div>
  <div class="session-bottom">
    <div class="round-info" id="round-info"></div>
    <button class="stop" id="stop-btn">Parar</button>
  </div>
</main>

<div id="custom-modal">
  <div class="modal-content">
    <h2>Personalizar</h2>
    <div class="custom-row">
      <span>Inspirar</span>
      <div class="stepper" data-key="inhale">
        <button class="dec">−</button>
        <span class="value">4</span>
        <button class="inc">+</button>
      </div>
    </div>
    <div class="custom-row">
      <span>Pausa após inspirar</span>
      <div class="stepper" data-key="hold1">
        <button class="dec">−</button>
        <span class="value">4</span>
        <button class="inc">+</button>
      </div>
    </div>
    <div class="custom-row">
      <span>Expirar</span>
      <div class="stepper" data-key="exhale">
        <button class="dec">−</button>
        <span class="value">4</span>
        <button class="inc">+</button>
      </div>
    </div>
    <div class="custom-row">
      <span>Pausa após expirar</span>
      <div class="stepper" data-key="hold2">
        <button class="dec">−</button>
        <span class="value">4</span>
        <button class="inc">+</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="custom-cancel">Cancelar</button>
      <button class="btn-confirm" id="custom-start">Começar</button>
    </div>
  </div>
</div>

<div class="session-end" id="session-end">
  <h2>CONCLUÍDO</h2>
  <p id="session-end-info"></p>
  <button id="session-end-btn">Voltar</button>
</div>

<script>
const PATTERNS = {
  box: {
    name: 'Box Breathing',
    desc: 'Foco e equilíbrio',
    pace: '4 · 4 · 4 · 4',
    phases: [
      { label: 'Inspire', dur: 4, scale: 1 },
      { label: 'Segure', dur: 4, scale: 1 },
      { label: 'Expire', dur: 4, scale: 0.42 },
      { label: 'Segure', dur: 4, scale: 0.42 },
    ],
  },
  r478: {
    name: '4 - 7 - 8',
    desc: 'Relaxar e dormir',
    pace: '4 · 7 · 8',
    phases: [
      { label: 'Inspire', dur: 4, scale: 1 },
      { label: 'Segure', dur: 7, scale: 1 },
      { label: 'Expire', dur: 8, scale: 0.42 },
    ],
  },
  coherent: {
    name: 'Coerente',
    desc: 'Equilíbrio do sistema nervoso',
    pace: '5.5 · 5.5',
    phases: [
      { label: 'Inspire', dur: 5.5, scale: 1 },
      { label: 'Expire', dur: 5.5, scale: 0.42 },
    ],
  },
  wimhof: {
    name: 'Wim Hof',
    desc: '3 rodadas: 30 ciclos + retenção',
    pace: '30× + retenção',
    special: true,
  },
  custom: {
    name: 'Personalizado',
    desc: 'Você define os tempos',
    pace: 'configurar',
    custom: true,
  },
};

const FREQ_HINTS = {
  0: '',
  396: 'libertação · medo e culpa',
  432: 'sintonia natural · relaxamento',
  528: 'transformação · cura',
  639: 'conexão · coração',
};

const state = {
  pattern: 'box',
  duration: 5,
  guide: 'voz',       // 'off' | 'sino' | 'voz'
  frequency: 0,
  volume: 1.8,        // 0.5 (baixo) | 1 (medio) | 1.8 (alto)
  custom: { inhale: 4, hold1: 4, exhale: 4, hold2: 4 },
  active: false,
  startTime: 0,
  endTime: 0,
  phaseTimer: null,
  tickTimer: null,
  counterIv: null,
  wakeLock: null,
  drone: null,
};

const STORAGE_KEY = 'respira-prefs-v1';
function loadPrefs() {
  try {
    const p = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (p.duration !== undefined) state.duration = p.duration;
    if (p.guide) state.guide = p.guide;
    else if (p.sound === 'off') state.guide = 'off'; // migrate old prefs
    else if (p.sound === 'soft') state.guide = 'sino';
    if (p.frequency !== undefined) state.frequency = p.frequency;
    if (p.volume !== undefined) state.volume = p.volume;
    if (p.custom) state.custom = { ...state.custom, ...p.custom };
  } catch {}
}
function savePrefs() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    duration: state.duration,
    guide: state.guide,
    frequency: state.frequency,
    volume: state.volume,
    custom: state.custom,
  }));
}

let audioCtx = null;
let audioUnlocked = false;
let silentLoopEl = null;

function generateSilentWAV() {
  const sr = 8000, secs = 0.5, n = Math.floor(sr * secs);
  const buf = new ArrayBuffer(44 + n * 2);
  const v = new DataView(buf);
  v.setUint32(0, 0x52494646, false);
  v.setUint32(4, 36 + n * 2, true);
  v.setUint32(8, 0x57415645, false);
  v.setUint32(12, 0x666d7420, false);
  v.setUint32(16, 16, true);
  v.setUint16(20, 1, true);
  v.setUint16(22, 1, true);
  v.setUint32(24, sr, true);
  v.setUint32(28, sr * 2, true);
  v.setUint16(32, 2, true);
  v.setUint16(34, 16, true);
  v.setUint32(36, 0x64617461, false);
  v.setUint32(40, n * 2, true);
  let bin = '';
  const bytes = new Uint8Array(buf);
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return 'data:audio/wav;base64,' + btoa(bin);
}

function ensureAudio() {
  if (!audioCtx) {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (Ctx) audioCtx = new Ctx();
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

  if (!audioUnlocked && audioCtx) {
    // Web Audio unlock via tiny silent buffer
    try {
      const b = audioCtx.createBuffer(1, 1, 22050);
      const s = audioCtx.createBufferSource();
      s.buffer = b;
      s.connect(audioCtx.destination);
      s.start(0);
    } catch {}
    // HTMLAudio loop unlock — bypasses iOS silent-switch quirks for PWAs
    try {
      silentLoopEl = document.createElement('audio');
      silentLoopEl.setAttribute('playsinline', '');
      silentLoopEl.setAttribute('webkit-playsinline', '');
      silentLoopEl.loop = true;
      silentLoopEl.volume = 0.001;
      silentLoopEl.src = generateSilentWAV();
      silentLoopEl.play().catch(() => {});
    } catch {}
    audioUnlocked = true;
    primeSpeech();
  }
  return audioCtx;
}
function playBell(freq = 528, vol = 0.32) {
  const ctx = ensureAudio();
  if (!ctx) return;
  vol *= state.volume;
  const now = ctx.currentTime;
  const harmonics = [
    { f: 1, a: vol, d: 2.6 },
    { f: 2.0, a: vol * 0.5, d: 1.6 },
    { f: 3.01, a: vol * 0.22, d: 1.0 },
  ];
  harmonics.forEach(h => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq * h.f;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(h.a, now + 0.018);
    g.gain.exponentialRampToValueAtTime(0.0001, now + h.d);
    osc.connect(g).connect(ctx.destination);
    osc.start(now);
    osc.stop(now + h.d + 0.05);
  });
}
function playEndBell() {
  playBell(396, 0.42);
  setTimeout(() => playBell(528, 0.32), 380);
}

// Voice guidance — iOS Web Speech API
let _ptVoice = null;
function primeSpeech() {
  if (!('speechSynthesis' in window)) return;
  try {
    speechSynthesis.getVoices();
    const u = new SpeechSynthesisUtterance(' ');
    u.volume = 0;
    u.lang = 'pt-BR';
    speechSynthesis.speak(u);
  } catch {}
}
function pickPtVoice() {
  if (!('speechSynthesis' in window)) return null;
  const voices = speechSynthesis.getVoices();
  return voices.find(v => v.lang === 'pt-BR' && /Luciana|Joana|Felipe/i.test(v.name)) ||
         voices.find(v => v.lang === 'pt-BR') ||
         voices.find(v => v.lang.startsWith('pt')) || null;
}
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  if (state.guide !== 'voz') return;
  try {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'pt-BR';
    u.rate = 0.92;
    u.pitch = 1;
    u.volume = Math.min(1, 0.85 * state.volume);
    if (!_ptVoice) _ptVoice = pickPtVoice();
    if (_ptVoice) u.voice = _ptVoice;
    speechSynthesis.speak(u);
  } catch {}
}

function createDrone(freq) {
  if (!freq || freq === 0) return null;
  const ctx = ensureAudio();
  if (!ctx) return null;
  const now = ctx.currentTime;

  const master = ctx.createGain();
  master.gain.setValueAtTime(0, now);
  master.gain.linearRampToValueAtTime(0.13 * state.volume, now + 4);
  master.connect(ctx.destination);

  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = Math.max(freq * 4, 1800);
  filter.Q.value = 0.5;
  filter.connect(master);

  const layers = [
    { mult: 0.5, type: 'sine',     detune: 0,   gain: 0.55 },
    { mult: 1,   type: 'sine',     detune: -8,  gain: 0.55 },
    { mult: 1,   type: 'sine',     detune: 0,   gain: 0.65 },
    { mult: 1,   type: 'sine',     detune: 8,   gain: 0.55 },
    { mult: 2,   type: 'sine',     detune: 0,   gain: 0.16 },
    { mult: 1.5, type: 'triangle', detune: 0,   gain: 0.08 },
  ];

  const nodes = [];
  layers.forEach((l, i) => {
    const osc = ctx.createOscillator();
    osc.type = l.type;
    osc.frequency.value = freq * l.mult;
    osc.detune.value = l.detune;

    const g = ctx.createGain();
    g.gain.value = l.gain * 0.13;

    const lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 0.05 + i * 0.025;
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = l.gain * 0.04;
    lfo.connect(lfoGain).connect(g.gain);

    osc.connect(g).connect(filter);
    osc.start(now);
    lfo.start(now);
    nodes.push(osc, lfo);
  });

  return { master, nodes };
}

function stopDrone(d) {
  if (!d) return;
  const ctx = audioCtx;
  if (!ctx) return;
  const now = ctx.currentTime;
  d.master.gain.cancelScheduledValues(now);
  d.master.gain.setValueAtTime(d.master.gain.value, now);
  d.master.gain.linearRampToValueAtTime(0, now + 2);
  setTimeout(() => {
    d.nodes.forEach(n => { try { n.stop(); } catch {} });
    try { d.master.disconnect(); } catch {}
  }, 2200);
}

function renderPatterns() {
  const list = document.getElementById('patterns-list');
  list.innerHTML = '';
  Object.entries(PATTERNS).forEach(([key, p]) => {
    const btn = document.createElement('button');
    btn.className = 'pattern';
    btn.innerHTML = `
      <div>
        <div class="name">${p.name}</div>
        <div class="desc">${p.desc}</div>
      </div>
      <div class="pace">${p.pace}</div>
    `;
    btn.addEventListener('click', () => onPatternClick(key));
    list.appendChild(btn);
  });
}
function onPatternClick(key) {
  state.pattern = key;
  ensureAudio();
  if (PATTERNS[key].custom) showCustomModal();
  else startSession();
}

function setupOpts(selector, key, parse, onChange) {
  const opts = document.querySelectorAll(selector + ' .option');
  opts.forEach(b => {
    const v = parse(b);
    if (v === state[key]) b.classList.add('active'); else b.classList.remove('active');
    b.addEventListener('click', () => {
      state[key] = v;
      opts.forEach(x => x.classList.toggle('active', x === b));
      savePrefs();
      if (onChange) onChange(v);
    });
  });
}

function updateFreqHint() {
  const hint = document.getElementById('freq-hint');
  if (hint) hint.textContent = FREQ_HINTS[state.frequency] || '';
}

function showCustomModal() {
  const modal = document.getElementById('custom-modal');
  ['inhale','hold1','exhale','hold2'].forEach(k => {
    modal.querySelector(`.stepper[data-key="${k}"] .value`).textContent = state.custom[k];
  });
  modal.classList.add('visible');
}
function hideCustomModal() {
  document.getElementById('custom-modal').classList.remove('visible');
}
function setupCustomModal() {
  const modal = document.getElementById('custom-modal');
  modal.querySelectorAll('.stepper').forEach(s => {
    const key = s.dataset.key;
    const val = s.querySelector('.value');
    s.querySelector('.dec').addEventListener('click', () => {
      const min = (key === 'inhale' || key === 'exhale') ? 1 : 0;
      if (state.custom[key] > min) {
        state.custom[key]--;
        val.textContent = state.custom[key];
        savePrefs();
      }
    });
    s.querySelector('.inc').addEventListener('click', () => {
      if (state.custom[key] < 20) {
        state.custom[key]++;
        val.textContent = state.custom[key];
        savePrefs();
      }
    });
  });
  document.getElementById('custom-cancel').addEventListener('click', hideCustomModal);
  document.getElementById('custom-start').addEventListener('click', () => {
    hideCustomModal();
    startSession();
  });
}

function getPhases(key) {
  if (key === 'custom') {
    const c = state.custom;
    const phases = [{ label: 'Inspire', dur: c.inhale, scale: 1 }];
    if (c.hold1 > 0) phases.push({ label: 'Segure', dur: c.hold1, scale: 1 });
    phases.push({ label: 'Expire', dur: c.exhale, scale: 0.42 });
    if (c.hold2 > 0) phases.push({ label: 'Segure', dur: c.hold2, scale: 0.42 });
    return phases;
  }
  return PATTERNS[key].phases;
}
function fmtTime(sec) {
  sec = Math.max(0, Math.floor(sec));
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      state.wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch {}
}
function releaseWakeLock() {
  if (state.wakeLock) {
    state.wakeLock.release().catch(()=>{});
    state.wakeLock = null;
  }
}

function startSession() {
  state.active = true;
  document.getElementById('home').style.display = 'none';
  document.getElementById('session').classList.add('active');
  document.getElementById('session-pattern-name').textContent =
    PATTERNS[state.pattern].name.toUpperCase();
  document.getElementById('round-info').textContent = '';
  ensureAudio();
  requestWakeLock();
  if (state.frequency > 0) state.drone = createDrone(state.frequency);

  state.startTime = Date.now();
  state.endTime = state.duration > 0 ? state.startTime + state.duration * 60_000 : 0;
  state.tickTimer = setInterval(updateTimerDisplay, 250);
  updateTimerDisplay();

  if (state.pattern === 'wimhof') runWimHof();
  else runStandard();
}

function updateTimerDisplay() {
  const now = Date.now();
  const el = document.getElementById('session-timer');
  if (state.endTime > 0) {
    const remaining = (state.endTime - now) / 1000;
    el.textContent = fmtTime(remaining);
    if (remaining <= 0 && state.pattern !== 'wimhof') finishSession();
  } else {
    el.textContent = fmtTime((now - state.startTime) / 1000);
  }
}

function runStandard() {
  const phases = getPhases(state.pattern);
  let idx = 0;
  function next() {
    if (!state.active) return;
    if (state.endTime > 0 && Date.now() >= state.endTime) { finishSession(); return; }
    const phase = phases[idx % phases.length];
    showPhase(phase);
    if (state.guide === 'sino' && phase.label === 'Inspire') playBell(528, 0.28);
    if (state.guide === 'voz') speak(phase.label);
    state.phaseTimer = setTimeout(() => { idx++; next(); }, phase.dur * 1000);
  }
  next();
}

function showPhase(phase) {
  const circle = document.getElementById('breathing-circle');
  circle.style.transitionDuration = phase.dur + 's';
  requestAnimationFrame(() => {
    circle.style.transform = `scale(${phase.scale})`;
  });
  document.getElementById('instruction').textContent = phase.label;
  const counter = document.getElementById('counter');
  const start = Date.now();
  const tick = () => {
    if (!state.active) return;
    const elapsed = (Date.now() - start) / 1000;
    const remaining = Math.ceil(phase.dur - elapsed);
    counter.textContent = remaining > 0 ? remaining : '';
  };
  tick();
  clearInterval(state.counterIv);
  state.counterIv = setInterval(tick, 200);
}

async function runWimHof() {
  const ROUNDS = 3, BREATHS = 30, BREATH_IN = 1.5, BREATH_OUT = 1.5, RECOVERY = 15;
  const circle = document.getElementById('breathing-circle');
  const instruction = document.getElementById('instruction');
  const counter = document.getElementById('counter');
  const roundInfo = document.getElementById('round-info');
  const tapHint = document.getElementById('tap-hint');

  state.endTime = 0;
  document.getElementById('session-timer').textContent = '';

  for (let r = 1; r <= ROUNDS; r++) {
    if (!state.active) return;
    roundInfo.textContent = `RODADA ${r} DE ${ROUNDS}`;
    if (state.guide === 'voz') speak(`Rodada ${r}`);
    for (let i = 0; i < BREATHS; i++) {
      if (!state.active) return;
      circle.style.transitionDuration = BREATH_IN + 's';
      circle.style.transform = 'scale(1)';
      instruction.textContent = 'Inspire';
      counter.textContent = `${i+1}/${BREATHS}`;
      await sleep(BREATH_IN * 1000);
      if (!state.active) return;
      circle.style.transitionDuration = BREATH_OUT + 's';
      circle.style.transform = 'scale(0.5)';
      instruction.textContent = 'Expire';
      await sleep(BREATH_OUT * 1000);
    }
    if (!state.active) return;
    circle.style.transitionDuration = '3s';
    circle.style.transform = 'scale(0.32)';
    instruction.textContent = 'Solte o ar';
    counter.textContent = '';
    if (state.guide === 'sino') playBell(440, 0.32);
    if (state.guide === 'voz') speak('Solte o ar');
    await sleep(2500);
    if (!state.active) return;

    instruction.textContent = 'Segure';
    counter.textContent = '0:00';
    if (state.guide === 'voz') speak('Segure');
    tapHint.classList.add('visible');
    const retentionStart = Date.now();
    const retentionIv = setInterval(() => {
      counter.textContent = fmtTime((Date.now()-retentionStart)/1000);
    }, 1000);
    await waitForTap();
    clearInterval(retentionIv);
    tapHint.classList.remove('visible');
    if (!state.active) return;

    instruction.textContent = 'Inspire fundo';
    counter.textContent = '';
    circle.style.transitionDuration = '2s';
    circle.style.transform = 'scale(1)';
    if (state.guide === 'sino') playBell(528, 0.32);
    if (state.guide === 'voz') speak('Inspire fundo');
    await sleep(2200);
    if (!state.active) return;

    instruction.textContent = 'Segure';
    if (state.guide === 'voz') speak('Segure quinze segundos');
    let rem = RECOVERY;
    counter.textContent = rem;
    for (let s = 0; s < RECOVERY; s++) {
      if (!state.active) return;
      await sleep(1000);
      rem--;
      counter.textContent = rem > 0 ? rem : '';
    }
  }
  if (state.active) finishSession();
}

function waitForTap() {
  return new Promise(resolve => {
    const session = document.getElementById('session');
    function handler(e) {
      if (e.target.closest('#stop-btn')) return;
      session.removeEventListener('click', handler);
      resolve();
    }
    session.addEventListener('click', handler);
  });
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function finishSession() {
  if (!state.active) return;
  state.active = false;
  clearTimeout(state.phaseTimer);
  clearInterval(state.tickTimer);
  clearInterval(state.counterIv);
  releaseWakeLock();
  stopDrone(state.drone); state.drone = null;
  try { speechSynthesis.cancel(); } catch {}
  playEndBell();
  const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
  document.getElementById('session-end-info').textContent =
    `${fmtTime(elapsed)} de respiração`;
  document.getElementById('session-end').classList.add('visible');
}

function resetSessionUI() {
  document.getElementById('session').classList.remove('active');
  document.getElementById('home').style.display = 'flex';
  const circle = document.getElementById('breathing-circle');
  circle.style.transitionDuration = '0.5s';
  circle.style.transform = 'scale(0.42)';
  document.getElementById('round-info').textContent = '';
  document.getElementById('counter').textContent = '';
  document.getElementById('instruction').textContent = 'Prepare';
  document.getElementById('tap-hint').classList.remove('visible');
}
function backFromEnd() {
  document.getElementById('session-end').classList.remove('visible');
  resetSessionUI();
}
function stopSession() {
  if (!state.active) return;
  state.active = false;
  clearTimeout(state.phaseTimer);
  clearInterval(state.tickTimer);
  clearInterval(state.counterIv);
  releaseWakeLock();
  stopDrone(state.drone); state.drone = null;
  try { speechSynthesis.cancel(); } catch {}
  resetSessionUI();
}

document.addEventListener('DOMContentLoaded', () => {
  loadPrefs();
  renderPatterns();
  setupOpts('#duration-opts', 'duration', b => Number(b.dataset.min));
  setupOpts('#guide-opts', 'guide', b => b.dataset.guide);
  setupOpts('#freq-opts', 'frequency', b => Number(b.dataset.freq), updateFreqHint);
  setupOpts('#vol-opts', 'volume', b => Number(b.dataset.vol));
  updateFreqHint();
  if ('speechSynthesis' in window) {
    speechSynthesis.addEventListener?.('voiceschanged', () => { _ptVoice = pickPtVoice(); });
    pickPtVoice();
  }
  setupCustomModal();
  document.getElementById('stop-btn').addEventListener('click', stopSession);
  document.getElementById('session-end-btn').addEventListener('click', backFromEnd);
  document.addEventListener('visibilitychange', () => {
    if (state.active && document.visibilityState === 'visible') requestWakeLock();
  });
});
</script>
</body>
